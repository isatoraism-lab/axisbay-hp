name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ZIP_FILE=$(ls AXIS_BAY_FullSite_Wix_v*.zip 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$ZIP_FILE" ]; then
            echo "Using uploaded FullSite zip: $ZIP_FILE"
            rm -rf extracted
            mkdir -p extracted
            unzip -q "$ZIP_FILE" -d extracted
            SITE_ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
            if [ -z "$SITE_ROOT" ]; then
              echo "No site folder found in zip." >&2
              exit 1
            fi
            cp -a "$SITE_ROOT"/. dist/
            rm -rf dist/wix-pages dist/rule-sources
          else
            echo "No FullSite zip found. Deploying repository files directly."
            shopt -s nullglob
            cp -a *.html *.xml *.txt *.webmanifest assets rules dist/ 2>/dev/null || true
          fi

      - name: Apply public links and join copy
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          disboard = "https://disboard.org/ja/server/1216271639952752691"
          x_url = "https://x.com/AxisBay89986"
          root = Path("dist")

          config = root / "assets/js/config.js"
          if config.exists():
              text = config.read_text(encoding="utf-8")
              text = text.replace('discordUrl: "DISCORD_INVITE_URL_HERE"', f'discordUrl: "{disboard}"')
              text = text.replace('xUrl: "X_URL_HERE"', f'xUrl: "{x_url}"')
              config.write_text(text, encoding="utf-8")

          replacements = {
              "AXIS BAYへの参加方法、最低限のルール、Discord申請の流れ。": "AXIS BAYへの参加方法、最低限のルール、Disboard経由でDiscordへ参加する流れ。",
              "参加条件と最低限のルールを確認して、Discordから申請してください。": "参加条件と最低限のルールを確認して、DisboardページからDiscordへ参加し、申請してください。",
              "最低限の確認を終えたら、Discordから参加申請へ進めます。": "最低限の確認を終えたら、DisboardページからDiscordへ参加し、参加申請へ進めます。",
              "<h3>Discordへ参加</h3>": "<h3>DisboardからDiscordへ参加</h3>",
              "<h3>Discordの案内と最低限ルールを確認</h3>": "<h3>Discord内の案内と最低限ルールを確認</h3>",
              "APPLY ON DISCORD": "APPLY VIA DISBOARD",
              "Discordから参加申請へ。": "DisboardからDiscord参加へ。",
              "申請方法と現在の募集状況はDiscordで案内しています。": "Disboardの掲載ページからDiscordへ参加し、Discord内で申請方法と募集状況を確認してください。",
              "AXIS BAY Discordへ参加": "AXIS BAYをDisboardで見る",
              "Discord名とキャラクター名を合わせ": "Discord名とキャラクター名を合わせ",
          }

          for path in [root / "index.html", root / "join.html"]:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              for before, after in replacements.items():
                  text = text.replace(before, after)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
