name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ZIP_FILE=$(ls AXIS_BAY_FullSite_Wix_v*.zip 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$ZIP_FILE" ]; then
            echo "Using uploaded FullSite zip: $ZIP_FILE"
            rm -rf extracted
            mkdir -p extracted
            unzip -q "$ZIP_FILE" -d extracted
            SITE_ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
            if [ -z "$SITE_ROOT" ]; then
              echo "No site folder found in zip." >&2
              exit 1
            fi
            cp -a "$SITE_ROOT"/. dist/
            rm -rf dist/wix-pages dist/rule-sources
          else
            echo "No FullSite zip found. Deploying repository files directly."
            shopt -s nullglob
            cp -a *.html *.xml *.txt *.webmanifest assets rules dist/ 2>/dev/null || true
          fi

      - name: Apply public links and rule patches
        shell: bash
        run: |
          python3 site_patches/patch_site.py
          python3 site_patches/patch_private_doctor.py
          python3 site_patches/patch_home_stats.py
          python3 site_patches/patch_crime_quick_reference.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
